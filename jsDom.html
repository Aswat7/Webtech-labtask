<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student List DOM Practice</title>
<link rel="stylesheet" href="jsDom.css">
</head>
<body>
<h1>Student List</h1>

<!-- Student Form -->
<form id="student-form">
  <label for="student-roll">Roll No.:</label>
  <input type="text" id="student-roll" placeholder="Enter roll no">
  <label for="student-name">Student Name:</label>
  <input type="text" id="student-name" placeholder="Enter student name">
  <button type="submit" id="add-btn" disabled>Add Student</button>
</form>

<!-- Search -->
<label for="search-student">Search student:</label>
<input type="text" id="search-student" placeholder="Type to search">

<!-- Student List -->
<ul id="student-list">
  <!-- New students will be added here -->
</ul>

<!-- Total and Attendance -->
<p id="total-students">Total students: 0</p>
<p id="attendance">Present: 0, Absent: 0</p>

<!-- Action Buttons -->
<button id="highlight-first">Highlight First Student</button>
<button id="sort-az">Sort A–Z</button>

<!-- JS file -->
<script src="JsDom.js"></script>
</body>
</html>
